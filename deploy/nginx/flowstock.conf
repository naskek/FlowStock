server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/certs/flowstock.crt;
  ssl_certificate_key /etc/nginx/certs/flowstock.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  client_max_body_size 50m;

  location = /tsd {
    return 308 https://$http_host/tsd/;
  }

  # Cache-Control для TSD/PWA выставляется в FlowStock.Server (ApplyTsdStaticCacheHeaders).
  # Если nginx когда-либо начнёт отдавать /tsd статикой напрямую:
  #   service-worker.js  -> Cache-Control: no-store
  #   index.html, manifest -> Cache-Control: no-cache
  #   *.abc12345.js/css  -> Cache-Control: public, max-age=31536000, immutable

  location / {
    proxy_pass http://flowstock:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
